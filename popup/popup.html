<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #2e7d32;
    }
    label {
      display: block;
      margin-bottom: 3px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 6px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover {
      background: #1b5e20;
    }
  </style>
</head>
<body>
  <h3>NFS-e Auto Preenchimento</h3>

  <label for="dataCompetencia">Data de Competência</label>
  <input type="date" id="dataCompetencia">

  <label for="valorUSD">Valor (USD)</label>
  <input type="text" id="valorUSD" placeholder="0,00">

  <label for="valorBRL">Valor (BRL)</label>
  <input type="text" id="valorBRL" placeholder="0,00">

  <button id="btnStart">Preencher</button>

  <script src="popup.js"></script>
</body>
</html>
